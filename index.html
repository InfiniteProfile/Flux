<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLUX</title>
<style>
  :root{
    --bg: #0a0a0c;
    --bg-elev: #131316;
    --gold: #c9a15a;
    --gold-soft: rgba(201,161,90,0.35);
    --teal: #2a9d8f;
    --teal-soft: rgba(42,157,143,0.30);
    --text: #ece7dd;
    --text-dim: #8a8780;
    --ring-size: 3px;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }
  body::before{
    content:"";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(201,161,90,0.06), transparent 45%),
      radial-gradient(ellipse at 85% 100%, rgba(42,157,143,0.07), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header{
    position: relative;
    z-index: 1;
    padding: 44px 20px 28px;
    text-align: center;
  }
  header .mark{
    display:inline-flex;
    align-items:center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  header .mark::before, header .mark::after{
    content:"";
    width: 24px; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold-soft));
  }
  header .mark::after{ background: linear-gradient(90deg, var(--gold-soft), transparent); }
  h1{
    margin: 14px 0 6px;
    font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 8vw, 3.6rem);
    letter-spacing: 0.06em;
    background: linear-gradient(120deg, var(--gold) 0%, #f1d9a8 35%, var(--teal) 75%, #4fc2b3 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p{
    margin: 0;
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  header p span{ color: var(--gold); }

  main{ position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 8px 16px 40px; }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 18px 14px;
    min-height: 40vh;
  }
  @media (min-width: 700px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 26px 20px; }
  }

  .card{
    display:flex; flex-direction:column; align-items:center;
    animation: rise 0.42s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .avatar{
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    border-radius: 50%;
    cursor: pointer;
    padding: var(--ring-size);
    background: conic-gradient(from 200deg, var(--gold) 0%, rgba(201,161,90,0.15) 22%, var(--teal) 50%, rgba(42,157,143,0.15) 72%, var(--gold) 100%);
    transition: transform 0.25s ease, filter 0.25s ease;
  }
  .avatar:active{ transform: scale(0.94); }
  @media (hover:hover){
    .avatar:hover{ transform: scale(1.045); filter: brightness(1.08); }
  }
  .avatar-inner{
    width:100%; height:100%;
    border-radius: 50%;
    overflow: hidden;
    background: var(--bg-elev);
    position: relative;
  }
  .avatar-inner img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
    opacity:0;
    transition: opacity 0.35s ease;
  }
  .avatar-inner img.loaded{ opacity:1; }
  .avatar-inner .skel{
    position:absolute; inset:0;
    background: linear-gradient(110deg, #16161a 8%, #1f1f24 18%, #16161a 33%);
    background-size: 200% 100%;
    animation: shimmer 1.3s linear infinite;
  }
  .avatar-inner .skel.gone{ display:none; }
  @keyframes shimmer{
    from{ background-position: 200% 0; }
    to{ background-position: -200% 0; }
  }

  /* pagination */
  .pager{
    position: relative; z-index:1;
    display:flex; flex-wrap: wrap;
    justify-content:center; align-items:center;
    gap: 6px;
    padding: 30px 10px 46px;
  }
  .pager button{
    min-width: 34px; height: 34px;
    padding: 0 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--bg-elev);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .pager button:hover:not(:disabled){ border-color: var(--gold-soft); color: var(--text); }
  .pager button:disabled{ opacity: 0.3; cursor: default; }
  .pager button.active{
    background: linear-gradient(135deg, var(--gold), var(--teal));
    color: #0a0a0c;
    font-weight: 600;
    border-color: transparent;
  }
  .pager .dots{ color: var(--text-dim); padding: 0 2px; font-size: 13px; user-select:none; }

  .status{
    position: relative; z-index:1;
    text-align:center;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding-bottom: 6px;
  }

  /* lightbox */
  .lightbox{
    position: fixed; inset:0;
    background: rgba(6,6,8,0.97);
    backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.25s ease;
    z-index: 50;
    touch-action: none;
  }
  .lightbox.open{ opacity:1; pointer-events:auto; }
  .lightbox img{
    max-width: 92vw; max-height: 86vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    opacity:0;
    transform: scale(0.97);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .lightbox img.shown{ opacity:1; transform: scale(1); }
  .lightbox .spinner{
    position:absolute;
    width: 30px; height:30px;
    border-radius:50%;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  .spinner.gone{ display:none; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .lb-btn{
    position: absolute;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    width: 42px; height: 42px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s ease;
  }
  .lb-btn:hover{ background: rgba(255,255,255,0.14); }
  .lb-close{ top: 18px; right: 18px; }
  .lb-prev{ left: 14px; top: 50%; transform: translateY(-50%); }
  .lb-next{ right: 14px; top: 50%; transform: translateY(-50%); }
  @media (max-width: 640px){
    .lb-prev, .lb-next{ width:36px; height:36px; font-size:15px; }
  }
  .lb-index{
    position:absolute; bottom: 20px; left:50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.08em; color: var(--text-dim);
  }

  ::selection{ background: var(--gold-soft); }
</style>
</head>

<header>

<main>

</main>

<div class="status" id="status"></div>
<nav class="pager" id="pager"></nav>

  <button class="lb-btn lb-next" id="lbNext" aria-label="Next">&#8250;</button>
  <div class="lb-index" id="lbIndex"></div>
</div>

  /* Convert a GitHub "blob" URL into a raw, directly-renderable image URL */
  function toRawUrl(base, filename){
    var raw = base.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
    return raw + encodeURIComponent(filename).replace(/%2F/g, "/");
  }

  var total = CONFIG.filenames.length;
  var perPage = CONFIG.perPage;
  var totalPages = Math.max(1, Math.ceil(total / perPage));
  var currentPage = 1;

  var grid = document.getElementById("grid");
  var pager = document.getElementById("pager");
  var statusEl = document.getElementById("status");
  var countLabel = document.getElementById("countLabel");
  var pageLabel = document.getElementById("pageLabel");
  var totalPagesLabel = document.getElementById("totalPagesLabel");

  countLabel.textContent = total;
  totalPagesLabel.textContent = totalPages;

  var io = null; // IntersectionObserver, rebuilt per page

  function destroyCurrentPage(){
    if(io){ io.disconnect(); io = null; }
    // Actively drop image src/srcset before removal so decoded bitmaps are freed sooner
    var imgs = grid.querySelectorAll("img");
    for(var i=0;i<imgs.length;i++){
      imgs[i].src = "";
      imgs[i].removeAttribute("src");
    }
    grid.innerHTML = "";
  }

  function renderPage(pageNum){
    pageNum = Math.min(Math.max(1, pageNum), totalPages);
    destroyCurrentPage();
    currentPage = pageNum;

    var start = (pageNum - 1) * perPage;
    var end = Math.min(start + perPage, total);
    var frag = document.createDocumentFragment();

    io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          var img = entry.target;
          var skel = img.parentElement.querySelector(".skel");
          img.src = img.dataset.src;
          img.onload = function(){
            img.classList.add("loaded");
            if(skel) skel.classList.add("gone");
          };
          io.unobserve(img);
        }
      });
    }, { root: null, rootMargin: "200px 0px", threshold: 0.01 });

    for(var i = start; i < end; i++){
      var filename = CONFIG.filenames[i];
      var url = toRawUrl(CONFIG.repoBase, filename);

      var card = document.createElement("div");
      card.className = "card";

      var avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.setAttribute("role", "button");
      avatar.setAttribute("tabindex", "0");
      avatar.dataset.index = i;

      var inner = document.createElement("div");
      inner.className = "avatar-inner";

      var skel = document.createElement("div");
      skel.className = "skel";

      var img = document.createElement("img");
      img.dataset.src = url;
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = "Profile photo";

      inner.appendChild(skel);
      inner.appendChild(img);
      avatar.appendChild(inner);
      card.appendChild(avatar);
      frag.appendChild(card);

      io.observe(img);
    }

    grid.appendChild(frag);

    grid.querySelectorAll(".avatar").forEach(function(el){
      el.addEventListener("click", function(){
        openLightbox(parseInt(el.dataset.index, 10));
      });
      el.addEventListener("keydown", function(e){
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          openLightbox(parseInt(el.dataset.index, 10));
        }
      });
    });

    pageLabel.textContent = pageNum;
    statusEl.textContent = "Showing " + (start + 1) + "–" + end + " of " + total;
    renderPager();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderPager(){
    pager.innerHTML = "";

    function addBtn(label, page, opts){
      opts = opts || {};
      var b = document.createElement("button");
      b.textContent = label;
      if(opts.active) b.classList.add("active");
      if(opts.disabled) b.disabled = true;
      b.addEventListener("click", function(){ renderPage(page); });
      pager.appendChild(b);
    }
    function addDots(){
      var s = document.createElement("span");
      s.className = "dots";
      s.textContent = "…";
      pager.appendChild(s);
    }

    addBtn("‹", currentPage - 1, { disabled: currentPage === 1 });

    var windowSize = 2;
    var pages = [];
    pages.push(1);
    for(var p = currentPage - windowSize; p <= currentPage + windowSize; p++){
      if(p > 1 && p < totalPages) pages.push(p);
    }
    if(totalPages > 1) pages.push(totalPages);
    pages = Array.from(new Set(pages)).sort(function(a,b){ return a-b; });

    var prev = null;
    pages.forEach(function(p){
      if(prev !== null && p - prev > 1) addDots();
      addBtn(String(p), p, { active: p === currentPage });
      prev = p;
    });

    addBtn("›", currentPage + 1, { disabled: currentPage === totalPages });
  }

  /* ---------------- Lightbox (browses the FULL set, loads one image at a time) --------------- */
  var lightbox = document.getElementById("lightbox");
  var lbImg = document.getElementById("lbImg");
  var lbSpinner = document.getElementById("lbSpinner");
  var lbIndex = document.getElementById("lbIndex");
  var lbClose = document.getElementById("lbClose");
  var lbPrev = document.getElementById("lbPrev");
  var lbNext = document.getElementById("lbNext");
  var activeIndex = 0;

  function openLightbox(index){
    activeIndex = index;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
    showLightboxImage(index);
  }
  function closeLightbox(){
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
    lbImg.classList.remove("shown");
    lbImg.src = "";
    lbImg.removeAttribute("src");
  }
  function showLightboxImage(index){
    lbImg.classList.remove("shown");
    lbSpinner.classList.remove("gone");
    var filename = CONFIG.filenames[index];
    var url = toRawUrl(CONFIG.repoBase, filename);
    lbIndex.textContent = (index + 1) + " / " + total;
    var loader = new Image();
    loader.onload = function(){
      lbImg.src = url;
      lbSpinner.classList.add("gone");
      lbImg.classList.add("shown");
    };
    loader.src = url;
  }
  function stepLightbox(delta){
    activeIndex = (activeIndex + delta + total) % total;
    showLightboxImage(activeIndex);
    // keep the underlying page grid in sync so pagination reflects current position
    var targetPage = Math.floor(activeIndex / perPage) + 1;
    if(targetPage !== currentPage) renderPage(targetPage);
  }

  lbClose.addEventListener("click", closeLightbox);
  lbPrev.addEventListener("click", function(){ stepLightbox(-1); });
  lbNext.addEventListener("click", function(){ stepLightbox(1); });
  lightbox.addEventListener("click", function(e){
    if(e.target === lightbox) closeLightbox();
  });
  document.addEventListener("keydown", function(e){
    if(!lightbox.classList.contains("open")) return;
    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowLeft") stepLightbox(-1);
    if(e.key === "ArrowRight") stepLightbox(1);
  });

  // swipe support
  var touchStartX = null;
  lightbox.addEventListener("touchstart", function(e){
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  lightbox.addEventListener("touchend", function(e){
    if(touchStartX === null) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 45){
      if(dx < 0) stepLightbox(1); else stepLightbox(-1);
    }
    touchStartX = null;
  }, { passive: true });

  renderPage(1);
})();
</script>
</body>
</html>
